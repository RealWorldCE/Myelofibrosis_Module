<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Real World CE | Myelofibrosis Real World Data</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
  
  
<style>
  :root{
    --rwce-blue:#2563eb;
    --rwce-indigo:#3730a3;
    --rwce-slate:#0f172a;
    --rwce-soft:#eff6ff;
    --rwce-line:#e2e8f0;
    --navy:#081528;
    --navy-2:#0d2342;
    --shadow:0 14px 34px rgba(15,23,42,.05);
    --shadow-strong:0 24px 60px rgba(15,23,42,.12);
  }

  *{ box-sizing:border-box; }
  html{ scroll-behavior:smooth; }

  body{
    font-family:'Inter',sans-serif;
    min-height:100vh;
    color:#0f172a;
    background:
      radial-gradient(circle at top left, rgba(59,130,246,0.10), transparent 28%),
      radial-gradient(circle at top right, rgba(99,102,241,0.12), transparent 32%),
      linear-gradient(180deg, #f8fbff 0%, #f8fafc 42%, #f1f5f9 100%);
  }

  .custom-scroll::-webkit-scrollbar { width: 7px; height:7px; }
  .custom-scroll::-webkit-scrollbar-track { background: transparent; }
  .custom-scroll::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 999px; }
  .custom-scroll::-webkit-scrollbar-thumb:hover { background-color: #94a3b8; }

  .glass-panel{
    background:rgba(255,255,255,.84);
    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);
    border:1px solid rgba(226,232,240,.95);
    box-shadow:none;
  }

  .glass-dark{
    position:relative;
    background:
      radial-gradient(circle at 16% 12%, rgba(125,211,252,.14), transparent 20%),
      radial-gradient(circle at 86% 20%, rgba(96,165,250,.10), transparent 20%),
      linear-gradient(180deg, rgba(8,21,40,.96), rgba(13,35,66,.92));
    backdrop-filter:blur(24px);
    -webkit-backdrop-filter:blur(24px);
    border-right:1px solid rgba(255,255,255,.08);
    box-shadow:none;
    overflow:hidden;
    isolation:isolate;
  }

  .glass-dark::before{
    content:"";
    position:absolute;
    inset:0;
    background:
      linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,0) 22%),
      radial-gradient(circle at top right, rgba(125,211,252,.08), transparent 28%);
    pointer-events:none;
    z-index:0;
  }

  .glass-dark::after{
    content:"";
    position:absolute;
    right:0;
    top:0;
    bottom:0;
    width:2px;
    background:linear-gradient(180deg, rgba(125,211,252,.06), rgba(125,211,252,.62), rgba(59,130,246,.14));
    box-shadow:0 0 20px rgba(125,211,252,.24);
    pointer-events:none;
    z-index:1;
  }

  .sidebar-glow{
    position:absolute;
    inset:0;
    pointer-events:none;
    z-index:0;
    overflow:hidden;
  }

  .sidebar-glow::before,
  .sidebar-glow::after{
    content:"";
    position:absolute;
    border-radius:999px;
    filter:blur(28px);
    opacity:.5;
    animation:floatGlow 10s ease-in-out infinite;
  }

  .sidebar-glow::before{
    width:180px;
    height:180px;
    top:3%;
    left:-36px;
    background:radial-gradient(circle, rgba(125,211,252,.30), rgba(125,211,252,0));
  }

  .sidebar-glow::after{
    width:220px;
    height:220px;
    bottom:8%;
    right:-56px;
    background:radial-gradient(circle, rgba(59,130,246,.24), rgba(59,130,246,0));
    animation-delay:2s;
  }

  .fade-in { animation: fadeIn .45s ease-out forwards; }
  .slide-up { animation: slideUp .45s cubic-bezier(.16,1,.3,1) forwards; }
  .lift { transition:transform .25s ease, box-shadow .25s ease, border-color .25s ease; }
  .lift:hover { transform:translateY(-2px); box-shadow:var(--shadow-strong); }

  .chip{
    display:inline-flex;
    align-items:center;
    gap:.4rem;
    padding:.45rem .8rem;
    border-radius:999px;
    font-size:.75rem;
    font-weight:700;
    letter-spacing:.06em;
    text-transform:uppercase;
    border:1px solid rgba(255,255,255,.10);
    background:rgba(255,255,255,.10);
    color:#dbeafe;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.08);
  }

  .hero-mesh{
    background:
      radial-gradient(circle at 20% 20%, rgba(125,211,252,.28), transparent 22%),
      radial-gradient(circle at 80% 18%, rgba(59,130,246,.28), transparent 24%),
      radial-gradient(circle at 70% 80%, rgba(14,165,233,.18), transparent 24%),
      linear-gradient(135deg, #081528 0%, #0d2342 50%, #1d4ed8 100%);
    position:relative;
    overflow:hidden;
    border:1px solid rgba(255,255,255,.10);
  }

  .hero-mesh::before,
  .hero-mesh::after{
    content:"";
    position:absolute;
    inset:auto;
    border-radius:999px;
    filter:blur(12px);
    opacity:.55;
    pointer-events:none;
  }

  .hero-mesh::before{
    width:240px;
    height:240px;
    top:-80px;
    right:-40px;
    background:radial-gradient(circle, rgba(125,211,252,.85), rgba(125,211,252,0));
  }

  .hero-mesh::after{
    width:220px;
    height:220px;
    bottom:-90px;
    left:-40px;
    background:radial-gradient(circle, rgba(59,130,246,.70), rgba(59,130,246,0));
  }

  .floating-orb{
    position:absolute;
    border-radius:999px;
    filter:blur(6px);
    opacity:.25;
    animation:floatOrb 8s ease-in-out infinite;
  }

  .orb-a{ width:110px; height:110px; background:#7dd3fc; top:16%; left:58%; }
  .orb-b{ width:76px; height:76px; background:#60a5fa; bottom:18%; right:22%; animation-delay:1.6s; }
  .orb-c{ width:52px; height:52px; background:#93c5fd; top:58%; left:18%; animation-delay:3.1s; }

  .stat-card{
    position:relative;
    overflow:hidden;
    background:linear-gradient(180deg, rgba(255,255,255,.98), rgba(248,250,252,.95));
    border:1px solid rgba(148,163,184,.16);
    border-radius:1.25rem;
    padding:1.1rem;
    box-shadow:0 16px 50px rgba(15,23,42,.08);
  }

  .stat-card::after{
    content:"";
    position:absolute;
    inset:auto -40px -40px auto;
    width:110px;
    height:110px;
    border-radius:999px;
    background:radial-gradient(circle, rgba(96,165,250,.16), transparent 65%);
  }

  .section-shell{
    max-width:1100px;
    margin:0 auto;
    display:grid;
    grid-template-columns:minmax(0,1fr);
    gap:1.5rem;
  }

  .gradient-rose{ background:linear-gradient(135deg, #7f1d1d 0%, #be123c 40%, #fb7185 100%); }
  .gradient-blue{ background:linear-gradient(135deg, #0b1f3a 0%, #1d4ed8 48%, #60a5fa 100%); }
  .gradient-emerald{ background:linear-gradient(135deg, #064e3b 0%, #0f766e 48%, #2dd4bf 100%); }

  .feature-card{
    background:linear-gradient(180deg, rgba(255,255,255,.97), rgba(255,255,255,.90));
    border:1px solid rgba(148,163,184,.18);
    border-radius:1.25rem;
    padding:1.2rem;
    box-shadow:0 14px 40px rgba(15,23,42,.08);
  }

  .section-header-card{
    position:relative;
    overflow:hidden;
    border-radius:1.5rem;
    padding:1.4rem;
    color:white;
    box-shadow:var(--shadow-strong);
  }

  .section-header-card::after{
    content:"";
    position:absolute;
    inset:auto;
    width:180px;
    height:180px;
    right:-60px;
    top:-60px;
    border-radius:999px;
    background:radial-gradient(circle, rgba(255,255,255,.22), rgba(255,255,255,0));
  }

  .nav-btn{
    width:100%;
    text-align:left;
    padding:.95rem 1rem;
    border-radius:1rem;
    display:flex;
    gap:.8rem;
    align-items:flex-start;
    transition:all .22s ease;
    border:1px solid transparent;
    position:relative;
    overflow:hidden;
  }

  .nav-btn::after{
    content:"";
    position:absolute;
    left:0;
    right:auto;
    bottom:0;
    width:0;
    height:2px;
    background:linear-gradient(90deg, rgba(125,211,252,.9), rgba(96,165,250,.62));
    transition:width .24s ease;
  }

  .nav-btn:hover{
    background:rgba(255,255,255,.08);
    border-color:rgba(255,255,255,.08);
    transform:translateX(2px);
  }

  .nav-btn:hover::after,
  .nav-btn.active-rose::after,
  .nav-btn.active-blue::after,
  .nav-btn.active-emerald::after{
    width:100%;
  }

  .nav-btn.active-rose{ background:rgba(255,241,242,.98); color:#9f1239; border-color:rgba(251,113,133,.28); box-shadow:0 10px 24px rgba(251,113,133,.12); }
  .nav-btn.active-blue{ background:rgba(239,246,255,.98); color:#1d4ed8; border-color:rgba(96,165,250,.28); box-shadow:0 10px 24px rgba(59,130,246,.12); }
  .nav-btn.active-emerald{ background:rgba(236,253,245,.98); color:#0f766e; border-color:rgba(45,212,191,.26); box-shadow:0 10px 24px rgba(20,184,166,.12); }

  .nav-icon{
    width:2rem;height:2rem;border-radius:.8rem;display:flex;align-items:center;justify-content:center;
    background:rgba(255,255,255,.08); color:rgba(255,255,255,.82); flex-shrink:0;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.05);
  }

  .progress-track{ height:.62rem; border-radius:999px; background:rgba(226,232,240,.9); overflow:hidden; }
  .progress-fill{ height:100%; border-radius:999px; background:linear-gradient(90deg, #1d4ed8, #38bdf8); transition:width .35s ease; box-shadow:0 0 18px rgba(56,189,248,.28); }

  .quiz-option{ transition:all .18s ease; }
  .quiz-option:hover{ transform:translateY(-1px); }

  .medical-grid{
    display:grid;
    grid-template-columns:repeat(12, minmax(0,1fr));
    gap:1rem;
  }

  .medical-card{
    border-radius:1.25rem;
    border:1px solid rgba(148,163,184,.16);
    background:linear-gradient(180deg, rgba(255,255,255,.98), rgba(248,250,252,.96));
    box-shadow:0 16px 44px rgba(15,23,42,.08);
    overflow:hidden;
  }

  .medical-card-header{
    padding:1rem 1.1rem;
    border-bottom:1px solid rgba(226,232,240,.85);
    background:linear-gradient(180deg, rgba(248,250,252,.95), rgba(255,255,255,.92));
  }

  .clinical-shell{
    background:linear-gradient(180deg, rgba(8,15,30,.98), rgba(15,23,42,.96));
    border:1px solid rgba(96,165,250,.18);
    border-radius:1.35rem;
    overflow:hidden;
    box-shadow:0 20px 50px rgba(15,23,42,.24);
  }

  .fade-swap { transition: opacity 280ms ease, transform 280ms ease; will-change: opacity, transform; }
  .swap-hidden { opacity: 0; transform: translateY(6px); pointer-events: none; }
  .swap-visible { opacity: 1; transform: translateY(0); }

  .dot-grid{
    background-image:radial-gradient(rgba(255,255,255,.10) 1px, transparent 1px);
    background-size:16px 16px;
  }

  .pill{
    display:inline-flex;align-items:center;gap:.4rem;padding:.42rem .78rem;border-radius:999px;font-size:.73rem;font-weight:700;
    background:#eff6ff;color:#1d4ed8;border:1px solid rgba(96,165,250,.26);
  }

  .completion-shell{
    position:relative;
    overflow:hidden;
    border-radius:1.5rem;
    background:linear-gradient(135deg, #0f172a 0%, #0b1f3a 42%, #0f766e 100%);
    color:white;
    box-shadow:var(--shadow-strong);
  }

  .completion-shell::before{
    content:"";
    position:absolute;
    inset:0;
    background:
      radial-gradient(circle at 20% 20%, rgba(125,211,252,.18), transparent 20%),
      radial-gradient(circle at 80% 80%, rgba(45,212,191,.16), transparent 22%);
    pointer-events:none;
  }

  .mobile-only { display:none; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes floatOrb { 0%,100% { transform: translateY(0px); } 50% { transform: translateY(-12px); } }
  @keyframes floatGlow { 0%,100% { transform:translateY(0) translateX(0); } 50% { transform:translateY(-8px) translateX(6px); } }

  @media (max-width: 1024px){
    .hero-actions{ flex-direction:column; align-items:flex-start; }
  }

  @media (max-width: 768px){
    .mobile-only { display:block; }
    .desktop-stats { display:none; }
    .section-shell { gap:1rem; }
  }
</style>


</head>
<body class="h-screen flex overflow-hidden">
  
  <aside id="sidebar" class="glass-dark text-white flex-shrink-0 transition-all duration-300 w-[310px] flex flex-col z-30 absolute md:relative h-full transform md:transform-none -translate-x-full md:translate-x-0">
    <div class="sidebar-glow"></div>

    <div class="px-5 py-5 border-b border-white/10 relative z-[2]">
      <div class="flex items-start justify-between gap-3">
        <div>
          <div class="text-[1.05rem] font-black tracking-[0.14em] uppercase">
            REAL WORLD <span class="text-sky-300">CE</span>
          </div>
          <div class="text-[10px] uppercase tracking-[0.32em] text-blue-100/70 mt-1">
            Featuring: Real World Data
          </div>
        </div>

        <button class="md:hidden text-white/70 hover:text-white" onclick="toggleSidebar()">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>
    </div>

    <div class="px-5 py-4 border-b border-white/10 relative z-[2]">
      <div class="flex items-center justify-between text-[11px] uppercase tracking-[0.20em] text-blue-100/70 font-semibold">
        <span>Learning Progress</span>
        <span id="progress-text">1 / 9</span>
      </div>
      <div class="mt-3">
        <div class="progress-track bg-white/10">
          <div id="progress-fill" class="progress-fill"></div>
        </div>
      </div>
      <div class="mt-3 text-[11px] text-blue-100/55 leading-relaxed">
        Navigate the curriculum using the sections below.
      </div>
    </div>

    <div class="px-4 py-4 overflow-y-auto custom-scroll flex-1 relative z-[2]">
      <div class="mb-5 grid grid-cols-2 gap-2 desktop-stats">
        <div class="rounded-2xl bg-white/6 border border-white/8 p-3">
          <div class="text-[11px] uppercase tracking-[0.14em] text-blue-100/65">Cases</div>
          <div class="text-xl font-black mt-1">3</div>
        </div>
        <div class="rounded-2xl bg-white/6 border border-white/8 p-3">
          <div class="text-[11px] uppercase tracking-[0.14em] text-blue-100/65">Quiz</div>
          <div class="text-xl font-black mt-1">3</div>
        </div>
      </div>

      <p class="text-[11px] text-blue-100/60 px-2 mb-4 uppercase tracking-[0.25em] font-semibold">Curriculum</p>
      <div id="nav-container" class="space-y-5"></div>
    </div>
  </aside>


  <div id="sidebar-overlay" class="fixed inset-0 bg-slate-950/50 backdrop-blur-sm z-20 hidden md:hidden" onclick="toggleSidebar()"></div>

  <div class="flex-1 flex flex-col h-full overflow-hidden relative">
    <header class="sticky top-0 z-20 px-4 md:px-6 pt-4 md:pt-5">
      <div class="glass-panel rounded-[1.35rem] px-4 md:px-5 py-3">
        <div class="flex items-center justify-between gap-4">
          <div class="flex items-center gap-4 min-w-0">
            <button class="md:hidden p-2 rounded-xl hover:bg-slate-100 text-slate-700" onclick="toggleSidebar()">
              <span class="material-symbols-outlined">menu</span>
            </button>
            <div class="min-w-0">
              <div class="text-[11px] uppercase tracking-[0.22em] text-slate-500 font-semibold">Interactive Clinical Education</div>
              <div class="flex items-center gap-2 text-sm md:text-base mt-1 min-w-0">
                <span id="breadcrumb-module" class="font-black text-slate-900 truncate">Module</span>
                <span class="material-symbols-outlined text-blue-600 text-[18px]">chevron_right</span>
                <span id="breadcrumb-section" class="font-semibold text-slate-600 truncate">Section</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </header>

    <main id="main-content" class="flex-1 overflow-y-auto px-4 md:px-6 pb-8 pt-4 custom-scroll"></main>
  </div>

  <script>
    const appData = {
      modules: {
        post_rux: {
          title: 'Post-Ruxolitinib',
          color: 'rose',
          sections: [
            { id: 'intro', title: 'The Danger Zone', icon: 'warning' },
            { id: 'guidelines', title: 'Second-Line Options', icon: 'rule' },
            { id: 'check1', title: 'Case Study: Robert', icon: 'quiz' },
          ]
        },
        anemia: {
          title: 'Anemia',
          color: 'blue',
          sections: [
            { id: 'intro', title: 'Prognostic Significance', icon: 'trending_down' },
            { id: 'momelotinib', title: 'ACVR1 & Momelotinib', icon: 'medication' },
            { id: 'check2', title: 'Case Study: Sarah', icon: 'quiz' },
          ]
        },
        novel: {
          title: 'Novel Targets',
          color: 'emerald',
          sections: [
            { id: 'intro', title: 'Exhausted Therapies', icon: 'hourglass_empty' },
            { id: 'nuvisertib', title: 'PIM1 & Nuvisertib', icon: 'biotech' },
            { id: 'check3', title: 'Clinical Validation', icon: 'task_alt' },
          ]
        }
      }
    };

    let activeModuleId = 'post_rux';
    let activeSectionId = 'intro';
    let quizStates = {};

    function getAllSections() {
      const list = [];
      for (const [moduleId, module] of Object.entries(appData.modules)) {
        module.sections.forEach(section => list.push({ moduleId, ...section, moduleTitle: module.title, color: module.color }));
      }
      return list;
    }

    function getSectionIndex(moduleId, sectionId) {
      const all = getAllSections();
      return all.findIndex(item => item.moduleId === moduleId && item.id === sectionId);
    }

    function getProgressPercent() {
      const index = getSectionIndex(activeModuleId, activeSectionId);
      const total = getAllSections().length;
      return ((index + 1) / total) * 100;
    }

    function colorClasses(color) {
      const map = {
        rose: {
          banner: 'gradient-rose',
          accentBtn: 'bg-rose-600 hover:bg-rose-700',
          text: 'text-rose-700',
          soft: 'bg-rose-50 border-rose-100',
          badge: 'bg-rose-100 text-rose-700 border-rose-200',
          ring: 'ring-rose-200',
          gradientText: 'from-rose-500 to-pink-500'
        },
        blue: {
          banner: 'gradient-blue',
          accentBtn: 'bg-blue-600 hover:bg-blue-700',
          text: 'text-blue-700',
          soft: 'bg-blue-50 border-blue-100',
          badge: 'bg-blue-100 text-blue-700 border-blue-200',
          ring: 'ring-blue-200',
          gradientText: 'from-blue-500 to-cyan-500'
        },
        emerald: {
          banner: 'gradient-emerald',
          accentBtn: 'bg-emerald-600 hover:bg-emerald-700',
          text: 'text-emerald-700',
          soft: 'bg-emerald-50 border-emerald-100',
          badge: 'bg-emerald-100 text-emerald-700 border-emerald-200',
          ring: 'ring-emerald-200',
          gradientText: 'from-emerald-500 to-teal-500'
        }
      };
      return map[color];
    }

    function renderHero(moduleId, kicker, title, text, stats = []) {
      const module = appData.modules[moduleId];
      const color = colorClasses(module.color);
      const statsHtml = stats.map(stat => `
        <div class="stat-card lift">
          <div class="text-[11px] uppercase tracking-[0.18em] text-slate-500 font-bold">${stat.label}</div>
          <div class="text-3xl font-black text-slate-900 mt-2">${stat.value}</div>
          <div class="text-sm text-slate-600 mt-2 leading-relaxed">${stat.copy}</div>
        </div>
      `).join('');

      return `
        <section class="section-shell slide-up">
          <div class="hero-mesh rounded-[2rem] p-6 md:p-8 shadow-[0_28px_80px_rgba(15,23,42,.18)] border border-white/10 text-white">
            <div class="floating-orb orb-a"></div>
            <div class="floating-orb orb-b"></div>
            <div class="floating-orb orb-c"></div>
            <div class="relative z-10 flex flex-col gap-8">
              <div class="flex flex-col xl:flex-row xl:items-end xl:justify-between gap-6 hero-actions">
                <div class="max-w-3xl">
                  <div class="chip mb-4">${kicker}</div>
                  <h1 class="text-3xl md:text-5xl font-black tracking-tight leading-[1.02] max-w-3xl">${title}</h1>
                  <p class="mt-4 text-base md:text-lg text-blue-50/88 max-w-2xl leading-relaxed">${text}</p>
                </div>
                <div class="glass-panel !bg-white/10 !border-white/10 rounded-[1.35rem] p-4 min-w-[260px] max-w-sm text-left">
                  <div class="text-[11px] uppercase tracking-[0.18em] text-blue-100/70 font-bold">Why this matters</div>
                  <div class="mt-2 text-xl font-extrabold">Sequencing choices dictate survival.</div>
                  <p class="mt-2 text-sm text-blue-50/75 leading-relaxed">This module translates the latest clinical data into actionable treatment sequencing for high-risk myelofibrosis.</p>
                </div>
              </div>
              <div class="grid grid-cols-1 md:grid-cols-3 gap-4">${statsHtml}</div>
            </div>
          </div>
        </section>
      `;
    }

    function renderSectionHeader(moduleId, title, copy, label = 'Section Overview') {
      const module = appData.modules[moduleId];
      const color = colorClasses(module.color);
      return `
        <div class="section-header-card ${color.banner}">
          <div class="relative z-10 flex flex-col gap-3 md:flex-row md:items-end md:justify-between">
            <div class="max-w-3xl">
              <div class="chip mb-2">${label}</div>
              <h2 class="text-2xl md:text-3xl font-black tracking-tight">${title}</h2>
              <p class="mt-3 text-white/84 text-base leading-relaxed max-w-2xl">${copy}</p>
            </div>
          </div>
        </div>
      `;
    }

    function getPrevNext(moduleId, sectionId) {
      const all = getAllSections();
      const index = getSectionIndex(moduleId, sectionId);
      const prev = index > 0 ? all[index - 1] : null;
      const next = index < all.length - 1 ? all[index + 1] : null;
      return {
        prev: prev ? { moduleId: prev.moduleId, sectionId: prev.id, label: prev.title } : null,
        next: next ? { moduleId: next.moduleId, sectionId: next.id, label: next.title } : null
      };
    }

        let style = 'bg-white border-slate-200 hover:border-blue-300';
        let icon = '<div class="w-5 h-5 rounded-full border border-slate-300"></div>';
        if (!state.submitted && state.selected === idx) {
          style = 'bg-blue-50 border-blue-500 ring-2 ring-blue-200';
          icon = '<div class="w-5 h-5 rounded-full border border-blue-500 bg-white flex items-center justify-center"><div class="w-2.5 h-2.5 rounded-full bg-blue-500"></div></div>';
        } else if (state.submitted) {
          if (idx === correctIndex) {
            style = 'bg-emerald-50 border-emerald-300 ring-2 ring-emerald-200';
            icon = '<div class="w-5 h-5 rounded-full bg-emerald-500 border-emerald-500 flex items-center justify-center"><span class="material-symbols-outlined text-white text-sm">check</span></div>';
          } else if (idx === state.selected) {
            style = 'bg-red-50 border-red-300 ring-2 ring-red-200';
            icon = '<div class="w-5 h-5 rounded-full border-red-500 flex items-center justify-center"><span class="material-symbols-outlined text-red-500 text-sm">close</span></div>';
          } else {
            style = 'bg-slate-50 border-slate-200 opacity-60';
          }
        }
        const clickAttr = !state.submitted ? `onclick="selectQuizOption('${id}', ${idx})"` : '';
        return `<button ${clickAttr} class="quiz-option text-left w-full p-4 rounded-2xl border transition-all duration-200 flex items-start gap-3 mb-3 ${style}">${icon}<span class="text-sm leading-relaxed ${state.submitted && idx === correctIndex ? 'font-bold text-emerald-900' : 'text-slate-700'}">${opt}</span></button>`;
      }).join('');

      const feedback = state.submitted
        ? `<div class="mt-5 p-5 rounded-2xl ${isCorrect ? 'bg-emerald-50 border border-emerald-200 text-emerald-900' : 'bg-red-50 border border-red-200 text-red-900'} fade-in"><div class="flex items-center gap-2 font-bold mb-2"><span class="material-symbols-outlined">${isCorrect ? 'check_circle' : 'cancel'}</span>${isCorrect ? 'Correct' : 'Incorrect'}</div><p class="text-sm leading-relaxed">${explanation}</p></div>`

      return `

            <div>

    function initClinicalVideos() {
      const blocks = document.querySelectorAll('[data-clinical-video-block="1"]');
      blocks.forEach(block => {
        const posterBtn = block.querySelector('[data-cv-poster]');
        const wrap = block.querySelector('[data-cv-wrap]');
        const replayBtn = block.querySelector('[data-cv-replay]');
        if (!posterBtn || !wrap) return;

        const showContent = () => {
          posterBtn.classList.add('swap-hidden');
          posterBtn.classList.remove('swap-visible');
          setTimeout(() => posterBtn.classList.add('hidden'), 280);
          wrap.classList.remove('hidden');
          requestAnimationFrame(() => {
            wrap.classList.remove('swap-hidden');
            wrap.classList.add('swap-visible');
          });
        };

        const hideContent = () => {
          wrap.classList.add('swap-hidden');
          wrap.classList.remove('swap-visible');
          setTimeout(() => wrap.classList.add('hidden'), 280);
          posterBtn.classList.remove('hidden');
          requestAnimationFrame(() => {
            posterBtn.classList.remove('swap-hidden');
            posterBtn.classList.add('swap-visible');
          });
        };

        posterBtn.addEventListener('click', showContent);
        if (replayBtn) replayBtn.addEventListener('click', hideContent);
      });
    }

                <p class="text-sm text-slate-600 mt-3 leading-relaxed">Hepcidin is a key regulator of iron homeostasis, driven in part by the BMP6/ACVR1/SMAD signaling pathway. Momelotinib is a first-in-class inhibitor of <strong>JAK1, JAK2, and ACVR1</strong>. By inhibiting ACVR1, momelotinib suppresses hepcidin expression, restoring iron-restricted erythropoiesis.</p>
              </div>
              <div class="feature-card border-t-4 border-blue-500">
                <div class="pill !bg-blue-50 !text-blue-700 !border-blue-200">The MOMENTUM Trial</div>
                <h3 class="text-xl font-black text-slate-900 mt-4">Clinical Efficacy</h3>
                <ul class="mt-4 space-y-3 text-sm text-slate-600">
                  <li class="flex gap-2"><span class="material-symbols-outlined text-blue-500 text-[18px]">check_circle</span>Superior to danazol in symptom response rate</li>
                  <li class="flex gap-2"><span class="material-symbols-outlined text-blue-500 text-[18px]">check_circle</span>Superior in spleen response rate at week 24</li>
                  <li class="flex gap-2"><span class="material-symbols-outlined text-blue-500 text-[18px]">check_circle</span>Superior in achieving transfusion independence</li>
                </ul>
              </div>
            </div>
            <div class="medical-card p-6 md:p-7 bg-gradient-to-r from-slate-900 to-navy-2 text-white border-0">
              <div class="pill !bg-white/10 !text-white !border-white/20">NCCN Guidelines Update</div>
              <h3 class="text-xl font-black mt-4">Category 1 Recommendation</h3>
              <p class="text-blue-100 mt-3 leading-relaxed max-w-3xl">NCCN guidelines now include a category 1 recommendation for momelotinib for patients with ongoing symptomatic splenomegaly and/or constitutional symptoms and MF-associated anemia. Treatment selection must systematically incorporate hemoglobin levels and transfusion burden.</p>
            </div>
            ${renderNavigationButtons({ moduleId:'anemia', sectionId:'intro', label:'Prognostic Significance' }, { moduleId:'anemia', sectionId:'check2', label:'Case Study: Sarah' })}
          </section>
        `;

        if (sectionId === 'check2') return `
          <section class="section-shell slide-up">
            ${renderSectionHeader('anemia', 'Case Study: Sarah', 'Sarah is symptomatic from both splenomegaly and worsening anemia. Treatment must balance symptom control with hemoglobin recovery.')}
            <div class="medical-grid">
              <div class="medical-card col-span-12 lg:col-span-4 p-6 md:p-7 bg-gradient-to-br from-white to-blue-50/40">
                <div class="pill">Patient Profile</div>
                <div class="mt-5 flex items-start gap-4">
                  <div class="w-14 h-14 rounded-2xl bg-indigo-100 text-indigo-700 flex items-center justify-center text-xl font-black">S</div>
                  <div>
                    <h3 class="text-xl font-black text-slate-900">Sarah</h3>
                    <p class="text-sm text-slate-600 mt-1">71-year-old with primary MF, spleen volume 18cm, and Hb 7.8 g/dL.</p>
                  </div>
                </div>
                <div class="mt-6 rounded-2xl border border-indigo-100 bg-white p-4 text-sm text-slate-600 leading-relaxed">
                  <strong class="text-slate-900 block mb-1">Clinical Context</strong>
                  She requires RBC transfusions every 3 weeks. Her current therapy controls her spleen moderately but exacerbates her anemia.
                </div>
              </div>
              <div class="col-span-12 lg:col-span-8">
                ${renderClinicalVideoBlock('sarah', 'Sarah', 'https://images.unsplash.com/photo-1551836022-b06985bceb24?auto=format&fit=crop&w=1200&q=80', '#', '“I’m exhausted all the time. I have to come into the clinic for blood transfusions constantly now. Is there any treatment that can help my spleen without destroying my red blood cells?”', { posterMaxClass: 'h-[340px] md:h-[380px] object-cover object-top', label: 'Sarah Clinical Observation' })}
              </div>
            </div>
            ${renderQuizComponent('quiz-sarah', 'Which specific mechanistic target differentiates momelotinib from other approved JAK inhibitors, allowing it to address Sarah’s MF-associated anemia by suppressing hepcidin?', [
              'PI3K pathway',
              'ACVR1 (ALK2)',
              'CALR mutation',
              'PIM1 kinase'
            ], 1, 'Correct. Momelotinib uniquely inhibits ACVR1 in addition to JAK1/JAK2. This suppression downregulates hepcidin, restoring iron metabolism and allowing for erythropoiesis in anemic patients.')}
            ${renderNavigationButtons({ moduleId:'anemia', sectionId:'momelotinib', label:'ACVR1 & Momelotinib' }, { moduleId:'novel', sectionId:'intro', label:'Exhausted Therapies' })}
          </section>
        `;
      }

      if (moduleId === 'novel') {
        if (sectionId === 'intro') return `
          ${renderHero('novel', '', 'What happens when all four JAK inhibitors are exhausted?', 'A growing population of patients has exhausted all approved pharmacologic options. Understanding the biology of emerging pathways like PIM1 is essential for timely clinical trial referral.', [
            { label: 'Approved JAKs', value: '4', copy: 'Ruxolitinib, fedratinib, pacritinib, and momelotinib.' },
            { label: 'Next Steps', value: 'Trials', copy: 'NCCN prefers clinical trial enrollment post-JAK failure.' },
            { label: 'Major Limitation', value: 'Toxicity', copy: 'Cytopenias from disease and therapy limit later lines of care.' }
          ])}
          <section class="section-shell">
            <div class="medical-grid">
              <div class="medical-card col-span-12 p-6 md:p-7">
                <div class="pill !bg-emerald-100 !text-emerald-700 !border-emerald-200">The Biological Rationale</div>
                <h2 class="text-2xl font-black text-slate-900 mt-4">The PIM1 Kinase Pathway</h2>
                <p class="text-slate-600 mt-3 leading-relaxed">PIM1 kinase has emerged as a biologically rational therapeutic target. It is overexpressed in hematologic malignancies including MF, promotes cell survival and proliferation by modulating cytokine-driven signaling pathways (like PI3K/AKT and JAK/STAT), and is specifically upregulated by JAK2 V617F mutant cells.</p>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mt-6">
                  <div class="rounded-2xl border border-red-200 bg-red-50 p-5">
                    <h3 class="font-bold text-red-900 mb-2">The Pan-PIM Problem</h3>
                    <p class="text-sm text-red-800 leading-relaxed">In preclinical models, utilizing pan-PIM kinase knockout or inhibition resulted in severe thrombocytopenia, limiting its utility in a disease where cytopenias are already a massive burden.</p>
                  </div>
                  <div class="rounded-2xl border border-emerald-200 bg-emerald-50 p-5">
                    <h3 class="font-bold text-emerald-900 mb-2">The Selective PIM1 Solution</h3>
                    <p class="text-sm text-emerald-800 leading-relaxed">Selective PIM1 knockout prevents MF progression <strong>without</strong> reducing platelet counts. This supports the hypothesis that selective PIM1 inhibition achieves antifibrotic effects with limited hematologic toxicity.</p>
                  </div>
                </div>
              </div>
            </div>
            ${renderNavigationButtons({ moduleId:'anemia', sectionId:'check2', label:'Case Study: Sarah' }, { moduleId:'novel', sectionId:'nuvisertib', label:'PIM1 & Nuvisertib' })}
          </section>
        `;

        if (sectionId === 'nuvisertib') return `
          <section class="section-shell slide-up">
            ${renderSectionHeader('novel', 'Nuvisertib (TP-3654): The Novel Option', 'Nuvisertib is an oral, highly selective PIM1 kinase inhibitor currently under evaluation in Phase 1/2 studies for relapsed/refractory MF.')}
            <div class="space-y-4">
              <div class="feature-card border-l-4 border-emerald-500">
                <div class="flex items-start gap-4">
                  <div class="h-12 w-12 rounded-2xl bg-emerald-100 text-emerald-700 flex items-center justify-center shrink-0"><span class="material-symbols-outlined">science</span></div>
                  <div>
                    <h3 class="text-xl font-black text-slate-900">Phase 1/2 Monotherapy Data</h3>
                    <p class="text-sm text-slate-600 mt-2 leading-relaxed">At 720 mg twice-daily, nuvisertib was well tolerated with no dose-limiting toxicities. Evaluated patients achieved spleen volume reduction (&ge;25% in 22.2%), total symptom score reduction (&ge;50% in 44.4%), and bone marrow fibrosis improvement (42.9%). Hemoglobin and platelet responses were also observed.</p>
                  </div>
                </div>
              </div>
              <div class="feature-card border-l-4 border-teal-500">
                <div class="flex items-start gap-4">
                  <div class="h-12 w-12 rounded-2xl bg-teal-100 text-teal-700 flex items-center justify-center shrink-0"><span class="material-symbols-outlined">join_inner</span></div>
                  <div>
                    <h3 class="text-xl font-black text-slate-900">Combination Therapy Potential</h3>
                    <p class="text-sm text-slate-600 mt-2 leading-relaxed">Preliminary data combining nuvisertib with momelotinib demonstrated a favorable safety profile across dose cohorts, with clinical responses providing early proof-of-concept for dual PIM1 and JAK/ACVR1 pathway inhibition.</p>
                  </div>
                </div>
              </div>
              <div class="feature-card border-l-4 border-blue-500">
                <div class="flex items-start gap-4">
                  <div class="h-12 w-12 rounded-2xl bg-blue-100 text-blue-700 flex items-center justify-center shrink-0"><span class="material-symbols-outlined">workspace_premium</span></div>
                  <div>
                    <h3 class="text-xl font-black text-slate-900">Regulatory Designations</h3>
                    <p class="text-sm text-slate-600 mt-2 leading-relaxed">Granted FDA Fast Track Designation (June 2025) and Orphan Drug Designation (FDA and Japan MHLW), recognizing its potential to address severe unmet medical needs in MF patients with limited treatment options.</p>
                  </div>
                </div>
              </div>
            </div>
            ${renderNavigationButtons({ moduleId:'novel', sectionId:'intro', label:'Exhausted Therapies' }, { moduleId:'novel', sectionId:'check3', label:'Clinical Validation' })}
          </section>
        `;

        if (sectionId === 'check3') return `
          <section class="section-shell slide-up">
            ${renderSectionHeader('novel', 'Clinical Assessment: Investigational Referral', 'Identify the specific rationale for novel clinical trial pathways when NCCN-approved options are exhausted.')}
            
            ${renderQuizComponent('quiz-nuvisertib', 'What is a key preclinical rationale for targeting PIM1 specifically (as with nuvisertib), rather than utilizing a pan-PIM kinase inhibitor, in relapsed/refractory MF?', [
              'Pan-PIM inhibitors cause severe thrombocytopenia, whereas selective PIM1 inhibition limits hematologic toxicity.',
              'Pan-PIM inhibitors are exclusively available as intravenous therapies.',
              'PIM1 is the only kinase mutated in primary myelofibrosis.',
              'PIM2 and PIM3 are entirely absent in human bone marrow.'
            ], 0, 'Correct. Preclinical models showed that selective PIM1 knockout prevented MF progression without reducing platelet counts, whereas pan-PIM kinase knockout caused severe thrombocytopenia. This makes selective PIM1 inhibition highly appealing in a cytopenic patient population.')}
            
            <div class="completion-shell p-6 md:p-7 mt-8">
              <div class="relative z-10 flex flex-col lg:flex-row lg:items-center lg:justify-between gap-5">
                <div>
                  <div class="chip">Module Complete</div>
                  <h3 class="text-2xl md:text-3xl font-black mt-3">Myelofibrosis Clinical Track Complete.</h3>
                  <p class="text-white/80 mt-3 max-w-2xl leading-relaxed">You have reviewed key protocols for post-ruxolitinib transitions, applied anemia-directed ACVR1 strategies, and evaluated the emerging mechanistic profile of PIM1 inhibitors like nuvisertib.</p>
                </div>
                <button class="inline-flex items-center gap-2 px-6 py-3 rounded-2xl bg-white text-slate-900 font-bold shadow-xl hover:bg-slate-100 transition" onclick="alert('Module Complete! Thank you for reviewing the Myelofibrosis updates.')">
                  Finish Module
                  <span class="material-symbols-outlined text-[18px]">check_circle</span>
                </button>
              </div>
            </div>
            ${renderNavigationButtons({ moduleId:'novel', sectionId:'nuvisertib', label:'PIM1 & Nuvisertib' }, null)}
          </section>
        `;
      }

      return '';
    }

    document.addEventListener('DOMContentLoaded', () => {
      renderMainContent();
    });
  </script>
